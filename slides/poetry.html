<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  width: 100vw; height: 100vh; overflow: hidden;
  background: #000; display: flex; align-items: center; justify-content: center;
  font-family: 'Georgia', 'Times New Roman', serif; color: #fff;
}
#poem {
  text-align: center;
  padding: 0 40px;
  opacity: 1;
  transition: opacity 0.6s ease-in-out;
}
#poem.fade-out { opacity: 0; }
.line {
  font-size: 42px;
  font-weight: 400;
  line-height: 1.3;
  letter-spacing: 1px;
  text-transform: uppercase;
}
.attribution {
  font-size: 16px;
  opacity: 0.4;
  font-style: italic;
  margin-top: 6px;
  text-transform: none;
}
</style>
</head>
<body>
<div id="poem">
  <div class="line" id="line1"></div>
  <div class="line" id="line2"></div>
  <div class="attribution" id="attr"></div>
</div>

<script>
const CYCLE_MS = 4000;
const FADE_MS = 600;

const poems = [
  // Allen Ginsberg — Howl (1955)
  { lines: ["I saw the best minds", "of my generation destroyed"], attr: "— Ginsberg, Howl" },
  { lines: ["destroyed by madness", "starving hysterical naked"], attr: "— Ginsberg, Howl" },
  { lines: ["dragging themselves through", "the negro streets at dawn"], attr: "— Ginsberg, Howl" },
  { lines: ["looking for an", "angry fix"], attr: "— Ginsberg, Howl" },
  { lines: ["angelheaded hipsters burning", "for the ancient heavenly connection"], attr: "— Ginsberg, Howl" },
  { lines: ["who poverty and tatters and", "hollow-eyed and high sat up"], attr: "— Ginsberg, Howl" },
  { lines: ["the starry dynamo in", "the machinery of night"], attr: "— Ginsberg, Howl" },

  // Lawrence Ferlinghetti — I Am Waiting (1958)
  { lines: ["I am waiting for my case", "to come up"], attr: "— Ferlinghetti, I Am Waiting" },
  { lines: ["I am waiting for a rebirth", "of wonder"], attr: "— Ferlinghetti, I Am Waiting" },
  { lines: ["I am perpetually awaiting", "a rebirth of wonder"], attr: "— Ferlinghetti, I Am Waiting" },
  { lines: ["I am waiting for the war", "to be fought"], attr: "— Ferlinghetti, I Am Waiting" },
  { lines: ["which will make", "the world safe for anarchy"], attr: "— Ferlinghetti, I Am Waiting" },
  { lines: ["I am waiting for the", "discovery of a new symbolic"], attr: "— Ferlinghetti, I Am Waiting" },
  { lines: ["western frontier", ""], attr: "— Ferlinghetti, I Am Waiting" },

  // Lawrence Ferlinghetti — A Coney Island of the Mind (1958)
  { lines: ["the world is a beautiful", "place to be born into"], attr: "— Ferlinghetti, Coney Island" },
  { lines: ["if you don't mind", "some people dying all the time"], attr: "— Ferlinghetti, Coney Island" },
  { lines: ["or maybe only starving", "some of the time"], attr: "— Ferlinghetti, Coney Island" },
  { lines: ["which isn't half so bad", "if it isn't you"], attr: "— Ferlinghetti, Coney Island" },

  // Allen Ginsberg — America (1956)
  { lines: ["America I've given you all", "and now I'm nothing"], attr: "— Ginsberg, America" },
  { lines: ["America two dollars and", "twenty-seven cents"], attr: "— Ginsberg, America" },
  { lines: ["I can't stand my", "own mind"], attr: "— Ginsberg, America" },
  { lines: ["America when will you", "be angelic"], attr: "— Ginsberg, America" },
  { lines: ["when will you take off", "your clothes"], attr: "— Ginsberg, America" },
  { lines: ["America when will you be", "worthy of your million Trotskyites"], attr: "— Ginsberg, America" },
  { lines: ["America why are your", "libraries full of tears"], attr: "— Ginsberg, America" },

  // Gregory Corso — Bomb (1958)
  { lines: ["Budger of history", "brake of time"], attr: "— Corso, Bomb" },
  { lines: ["you bomb", "toy of universe"], attr: "— Corso, Bomb" },

  // Gary Snyder — A Berry Feast (1957)
  { lines: ["this poetry is the", "eagle of experience"], attr: "— Snyder" },

  // Jack Kerouac — Mexico City Blues (1959)
  { lines: ["I want to be considered", "a jazz poet"], attr: "— Kerouac, Mexico City Blues" },
  { lines: ["blowing a long blues", "in an afternoon jam session"], attr: "— Kerouac, Mexico City Blues" },

  // Diane di Prima — Revolutionary Letter #1 (1971)
  { lines: ["I have just realized that", "the stakes are myself"], attr: "— di Prima, Revolutionary Letters" },
  { lines: ["I have no other", "ransom money nothing to"], attr: "— di Prima, Revolutionary Letters" },
  { lines: ["negotiate with", ""], attr: "— di Prima, Revolutionary Letters" },

  // Amiri Baraka (LeRoi Jones) — Black Art (1965)
  { lines: ["poems are bullshit", "unless they are teeth"], attr: "— Baraka, Black Art" },
  { lines: ["we want poems that kill", "assassin poems"], attr: "— Baraka, Black Art" },

  // Bob Kaufman — Jail Poems (1959)
  { lines: ["I am sitting in a cell", "with a view of evil parallels"], attr: "— Kaufman, Jail Poems" },
  { lines: ["writing poems on", "the wall of my mind"], attr: "— Kaufman, Jail Poems" },

  // Ferlinghetti — Populist Manifesto (1975)
  { lines: ["poets come out of", "your closets"], attr: "— Ferlinghetti, Populist Manifesto" },
  { lines: ["open your windows", "open your doors"], attr: "— Ferlinghetti, Populist Manifesto" },
  { lines: ["you have been hiding", "too long in the dark"], attr: "— Ferlinghetti, Populist Manifesto" },
  { lines: ["the world is waiting", "for a new sign"], attr: "— Ferlinghetti, Populist Manifesto" },
];

let index = 0;
const poemEl = document.getElementById('poem');
const line1 = document.getElementById('line1');
const line2 = document.getElementById('line2');
const attr = document.getElementById('attr');

function showVerse() {
  const verse = poems[index % poems.length];
  line1.textContent = verse.lines[0];
  line2.textContent = verse.lines[1];
  attr.textContent = verse.attr;
  poemEl.classList.remove('fade-out');
}

function cycle() {
  // Fade out
  poemEl.classList.add('fade-out');
  setTimeout(() => {
    index++;
    showVerse();
  }, FADE_MS);
}

showVerse();
setInterval(cycle, CYCLE_MS);
</script>
</body>
</html>
