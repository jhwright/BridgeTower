<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
<title>Tower Sign</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@800&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body {
  width: 100vw; height: 100vh; overflow: hidden;
  background: #111;
  display: flex; align-items: center; justify-content: center;
}
#sign {
  width: 768px;
  height: 192px;
  background: #2a2520;
  border: 1px solid #DF562A;
  display: flex; align-items: center; justify-content: center;
  overflow: hidden;
  position: relative;
}
#poem {
  text-align: center;
  width: 768px;
  padding: 0 16px;
  opacity: 1;
  transition: opacity 0.6s ease-in-out;
}
#poem.fade-out { opacity: 0; }
#lines {
  font-family: 'Plus Jakarta Sans', sans-serif;
  font-weight: 800;
  line-height: 1.15;
  letter-spacing: 2px;
  text-transform: uppercase;
  white-space: nowrap;
  color: #fff;
}
</style>
</head>
<body>
<div id="sign">
  <div id="poem">
    <div id="lines"></div>
  </div>
</div>

<script>
const CYCLE_MS = 6000;
const FADE_MS = 600;
const MAX_FONT = 80;
const MIN_FONT = 28;
const SIGN_W = 768;
const SIGN_H = 192;
const PAD = 36;

// Bridge division colors
const COLORS = [
  '#DF562A', // Orange (Storage)
  '#E9A825', // Marigold (Events)
  '#4A7A8C', // Steel Blue (Kitchen)
  '#1B6B3A', // Forest Green (Garden)
  '#8B2332', // Dark Crimson (Art)
  '#2A7F8C', // Teal (Coworking)
  '#6B4267', // Deep Plum (Lounge)
  '#ffffff', // White
];

const poems = [
  // Ginsberg — Howl
  "I saw the best minds\nof my generation",
  "destroyed by madness\nstarving hysterical",
  "looking for\nan angry fix",
  "angelheaded hipsters\nburning",
  "hollow-eyed and high\nsat up smoking",
  "the starry dynamo\nin the machinery",
  "gaps in time\n& space",
  "expelled from\nthe academies",

  // Ginsberg — America
  "I've given you all\nand now I'm nothing",
  "I can't stand\nmy own mind",
  "America\nwhen will you be angelic",
  "why are your\nlibraries full of tears",
  "your life be run\nby Instagram",

  // Ferlinghetti — I Am Waiting
  "perpetually awaiting\na rebirth of wonder",
  "waiting for the Age\nof Anxiety to drop dead",

  // Ferlinghetti — Coney Island
  "the world is\na beautiful place",
  "if you don't mind\nsome people dying",
  "not half so bad\nif it isn't you",
  "not so far away\nsomebody is screaming",

  // Ferlinghetti — Populist Manifesto
  "poets come out\nof your closets",
  "open your windows\nopen your doors",
  "you have been hiding\ntoo long in the dark",
  "the world is waiting\nfor a new sign",

  // Ferlinghetti — Pity the Nation
  "pity the nation\nwhose people are sheep",
  "pity the nation\nwhose leaders are liars",

  // di Prima
  "I have just realized\nthe stakes are myself",
  "the only war\nthat matters",

  // Baraka
  "poems are bullshit\nunless they are teeth",
  "we want poems\nthat kill",

  // Kaufman
  "writing poems\non the wall of my mind",
  "would you wear\nmy eyes",

  // Corso
  "budger of history\nbrake of time",
  "should I get married\nshould I be good",

  // Kerouac
  "I want to be\na jazz poet",
  "blowing a long blues\nin a jam session",
  "did I create that sky\nyes I am the earth",

  // Snyder
  "lay down these words\nlike rocks",
  "stay together\nlearn the flowers",

  // Others
  "locked in our rooms\nwe must break out",
  "we're not our grime\nwe're sunflowers inside",
  "I here declare\nthe end of the war",
  "I'm the fast\nspeaking woman",

  // Tupac
  "I see no changes\nall I see is racist faces",
  "we gotta make\na change",
  "the world ain't good\nbut it ain't all bad",

  // Kendrick
  "we gon' be alright",
  "sit down\nbe humble",
  "I am all of us",

  // Nas
  "I never sleep\nsleep is cousin of death",
  "the world is yours",
  "whose world is this\nthe world is yours",

  // Others
  "bigger than hip hop",
  "the devil crept\ninto Heaven",
  "slave masters posing\non your dollar",
  "everything\nis everything",
  "after winter\nmust come spring",
  "those that work forces\nburn crosses",
  "fight the power",
  "freedom of speech\nis freedom or death",
  "sorry America\nnot your soldier",
  "all we want\nis to be free",
];

const MANTRA = "NO KINGS.  NO ICE.  NO WAR.";

const MAKE_WORDS = [
  "trouble", "connection", "art", "noise", "food", "friends",
  "out", "dance", "music", "history", "signs", "friction",
  "love", "resistance", "change", "peace", "action", "movement",
  "progress", "a call", "shelter", "justice", "a difference",
];

let index = 0;
let showMantra = false;
let showMake = false;
let makeIndex = 0;
let colorIndex = 0;
const poemEl = document.getElementById('poem');
const linesEl = document.getElementById('lines');
const sign = document.getElementById('sign');

// DOM-based measurement (more accurate than canvas for web fonts)
const measurer = document.createElement('div');
measurer.style.cssText = 'position:absolute;visibility:hidden;white-space:nowrap;font-family:Plus Jakarta Sans,sans-serif;font-weight:800;text-transform:uppercase;letter-spacing:2px;';
document.body.appendChild(measurer);

function measureWidth(text, fontSize) {
  measurer.style.fontSize = fontSize + 'px';
  measurer.textContent = text;
  return measurer.offsetWidth;
}

function fitText(text) {
  const parts = text.split('\n');
  const maxW = SIGN_W - PAD;
  const maxH = SIGN_H - 12;

  let bestSize = MAX_FONT;
  for (const part of parts) {
    let sz = MAX_FONT;
    while (sz > MIN_FONT && measureWidth(part.toUpperCase(), sz) > maxW) {
      sz -= 1;
    }
    bestSize = Math.min(bestSize, sz);
  }

  // Vertical fit
  const neededH = parts.length * (bestSize * 1.15);
  if (neededH > maxH) {
    bestSize = Math.floor(maxH / (parts.length * 1.15));
  }

  return Math.max(MIN_FONT, bestSize);
}

function showVerse() {
  const color = COLORS[colorIndex % COLORS.length];
  sign.style.borderColor = color;

  if (showMake) {
    // MAKE slide — colored block shifts horizontally, word fills remaining space
    const word = MAKE_WORDS[makeIndex % MAKE_WORDS.length];
    const makeColor = COLORS[(colorIndex + makeIndex) % COLORS.length];
    const wordColor = COLORS[(colorIndex + makeIndex + 3) % COLORS.length];
    // Shift MAKE block position: alternate left/right/center
    const positions = ['flex-start', 'flex-end', 'center', 'flex-end', 'flex-start'];
    const pos = positions[makeIndex % positions.length];
    // Shift vertical alignment too for pixel burn prevention
    const vShift = (makeIndex % 5) * 6 - 12; // -12 to +12 px

    poemEl.style.padding = '0';
    linesEl.style.fontSize = '';
    linesEl.style.color = '';
    linesEl.innerHTML =
      '<div style="display:flex;align-items:center;justify-content:' + pos + ';width:768px;height:192px;padding:0 8px;margin-top:' + vShift + 'px;">' +
        '<div style="background:' + makeColor + ';padding:8px 20px;margin:0 12px;">' +
          '<span style="font-family:Plus Jakarta Sans,sans-serif;font-weight:800;font-size:60px;color:#2a2520;text-transform:uppercase;letter-spacing:2px;">MAKE</span>' +
        '</div>' +
        '<div id="makeword" style="font-family:Plus Jakarta Sans,sans-serif;font-weight:800;color:' + wordColor + ';text-transform:uppercase;letter-spacing:2px;white-space:nowrap;">' + word + '</div>' +
      '</div>';
    sign.style.borderColor = makeColor;
    // Auto-size the word to fill remaining space
    const mw = document.getElementById('makeword');
    let sz = 90;
    mw.style.fontSize = sz + 'px';
    while (sz > 30 && mw.scrollWidth > (SIGN_W - 220)) {
      sz -= 2;
      mw.style.fontSize = sz + 'px';
    }
    poemEl.classList.remove('fade-out');
    return;
  }

  const text = showMantra ? MANTRA : poems[index % poems.length];
  const parts = text.split('\n');
  const fontSize = fitText(text);
  const textColor = showMantra ? '#ffffff' : color;

  poemEl.style.padding = '0 16px';
  linesEl.style.fontSize = fontSize + 'px';
  linesEl.style.color = textColor;
  linesEl.innerHTML = parts.map(p => '<div>' + p + '</div>').join('');
  poemEl.classList.remove('fade-out');
}

// Cycle: poem → mantra → poem → mantra → ... every 4th mantra is a MAKE instead
let mantraCount = 0;

function cycle() {
  poemEl.classList.add('fade-out');
  setTimeout(() => {
    if (showMake) {
      // After MAKE, back to poems
      showMake = false;
      showMantra = false;
      index++;
      colorIndex++;
      makeIndex++;
    } else if (showMantra) {
      showMantra = false;
      index++;
      colorIndex++;
    } else {
      // Time for interstitial
      mantraCount++;
      if (mantraCount % 3 === 0) {
        // Every 3rd interstitial is a MAKE slide
        showMake = true;
        showMantra = false;
      } else {
        showMantra = true;
        showMake = false;
      }
    }
    showVerse();
  }, FADE_MS);
}

// Wait for font to load before starting
document.fonts.ready.then(() => {

// Shuffle poems
for (let i = poems.length - 1; i > 0; i--) {
  const j = Math.floor(Math.random() * (i + 1));
  [poems[i], poems[j]] = [poems[j], poems[i]];
}

showVerse();
setInterval(cycle, CYCLE_MS);

}); // end fonts.ready
</script>
</body>
</html>
